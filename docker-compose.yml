version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: book-library-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookuser
      POSTGRES_PASSWORD: bookpass
      POSTGRES_DB: bookdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookuser -d bookdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-library-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://bookuser:bookpass@postgres:5432/bookdb"
      ADDR: ":8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
